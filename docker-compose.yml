version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: 2way-lock-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-2way_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-2way_password}
      POSTGRES_DB: ${DB_NAME:-2way_lock_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-2way_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 2way-network

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: 2way-lock-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 2way-network

  # ClamAV Antivirus (for threat scanning)
  clamav:
    image: clamav/clamav:latest
    container_name: 2way-lock-clamav
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    environment:
      FRESHCLAM_CHECKS: 1
    healthcheck:
      test: ["CMD", "clamdscan", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - 2way-network

  # Node.js Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 2way-lock-api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-2way_user}:${DB_PASSWORD:-2way_password}@postgres:5432/${DB_NAME:-2way_lock_dev}
      REDIS_URL: redis://redis:6379
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-key-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./dist:/app/dist
    networks:
      - 2way-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: 2way-lock-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - 2way-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  clamav_data:

networks:
  2way-network:
    driver: bridge
